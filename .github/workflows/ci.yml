name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  go-test:
    name: Go API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: api/go.sum
      - run: go build ./...
      - run: go test ./... -v

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  create-issues-on-failure:
    name: Create Issues on Failure
    needs: [go-test, frontend-test]
    if: failure() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const failures = [];
            const goResult = '${{ needs.go-test.result }}';
            const frontendResult = '${{ needs.frontend-test.result }}';

            if (goResult === 'failure') {
              failures.push('Go API Tests');
            }
            if (frontendResult === 'failure') {
              failures.push('Frontend Tests');
            }

            if (failures.length === 0) return;

            const body = `## CI Failure Report

            The following jobs failed on the latest push to \`master\`:

            ${failures.map(j => `- ❌ **${j}**`).join('\n')}

            See [CI run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            Auto-generated by CI workflow.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failure: ${failures.join(', ')} (${new Date().toISOString().slice(0, 10)})`,
              body: body,
              labels: ['ci-failure', 'automated']
            });
