root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server.exe ."
  bin = "./tmp/server.exe"
  delay = 500
  exclude_dir = ["tmp", "vendor"]
  exclude_regex = [".*_test.go"]
  exclude_unchanged = true
  log = "build-errors.log"
  poll = true
  poll_interval = 300

[log]
  main_only = false

[color]
  main = "cyan"
  watcher = "green"
  build = "yellow"
  runner = "magenta"
